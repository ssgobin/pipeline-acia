<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pipeline TV Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="./assets/img/logo_principal.svg" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="./css/dashboard-tv.css" />
</head>
<body>
  <div class="tv-shell">
    <!-- topo -->
    <header class="tv-header">
      <div class="brand">
        <div class="brand-logo-wrap">
          <img src="./assets/img/logo_white.svg" alt="Logo" class="brand-logo" />
        </div>
        <div>
          <div class="brand-title">Pipeline</div>
          <div class="brand-sub">Painel ao vivo • Leads • Status • Performance</div>
        </div>
      </div>

      <div class="header-right">
        <div class="clock-box">
          <div id="clockTime" class="clock-time">--:--:--</div>
          <div id="clockDate" class="clock-date">--</div>
        </div>
      </div>
    </header>

    <!-- KPIs -->
    <section class="kpi-grid">
      <div class="kpi-card glow-purple">
        <div class="kpi-label"><i class="bi bi-people"></i> Leads totais</div>
        <div id="kpiTotal" class="kpi-value">0</div>
      </div>

      <div class="kpi-card glow-green">
        <div class="kpi-label"><i class="bi bi-fire"></i> Quentes (Avançado+)</div>
        <div id="kpiHot" class="kpi-value">0</div>
      </div>

      <div class="kpi-card glow-red">
        <div class="kpi-label"><i class="bi bi-x-octagon"></i> Perdidos</div>
        <div id="kpiLost" class="kpi-value">0</div>
      </div>

      <div class="kpi-card glow-blue">
        <div class="kpi-label"><i class="bi bi-calendar-check"></i> Atualizados hoje</div>
        <div id="kpiToday" class="kpi-value">0</div>
      </div>
    </section>

    <!-- conteúdo principal (grid 3 colunas) -->
    <main class="tv-main-grid">
      <!-- coluna esquerda: Funil e Top Responsáveis -->
      <section class="panel panel-left">
        <div class="panel-header">
          <span><i class="bi bi-arrow-down-funnel"></i> Funil por Status</span>
        </div>
        <div id="funnelRows" class="funnel-rows"></div>
      </section>

      <!-- coluna central: Gráfico Rotativo por Responsável -->
      <section class="panel panel-center">
        <div class="panel-header">
          <div class="owner-header">
            <span id="ownerChartTitle"><i class="bi bi-person-check"></i> Responsável</span>
            <div class="owner-nav">
              <button id="prevOwner" class="owner-btn"><i class="bi bi-chevron-left"></i></button>
              <div id="ownerCounter" class="owner-counter">1/1</div>
              <button id="nextOwner" class="owner-btn"><i class="bi bi-chevron-right"></i></button>
            </div>
          </div>
        </div>
        <div class="owner-chart-wrap">
          <canvas id="ownerChart" style="max-height: 300px;"></canvas>
          <div id="ownerStats" class="owner-stats"></div>
        </div>
      </section>

      <!-- coluna direita: SLA e Últimos Leads -->
      <section class="panel panel-right">
        <div class="panel-header">
          <span><i class="bi bi-exclamation-triangle"></i> Alertas SLA</span>
        </div>
        <div id="slaList" class="list-wrap sla-wrap"></div>
      </section>
    </main>

    <!-- rodapé -->
    <footer class="tv-footer">
      <div id="ticker" class="ticker">Conectando ao Firestore...</div>
      <div class="footer-right">Auto atualização em tempo real</div>
    </footer>
  </div>

  <script type="module" src="./js/dashboard-tv.js"></script>
</body>
</html>
